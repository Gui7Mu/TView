<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CSV Loader Minimal</title>
<style>
:root{--bg:#0f1117;--panel:#171a22;--text:#e7eaf0;--muted:#8e96a3;--accent:#4ea1ff;--border:#2a2f3a;--ok:#26a69a;--bad:#ef5350}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
#top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:#10131a;position:sticky;top:0;z-index:10}
.btn{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
#file{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}
#status{font-size:13px;color:var(--muted)}
#debug{font-size:12px;color:var(--muted)}
#out{padding:16px;white-space:pre-wrap;line-height:1.4}
.card{padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--panel);margin:12px}
.ok{color:var(--ok)} .bad{color:var(--bad)}
</style>
</head>
<body>
<div id="top">
  <input id="file" type="file" accept=".csv,text/csv">
  <label class="btn primary" for="file">Carica CSV</label>
  <button class="btn" id="demo">Demo</button>
  <button class="btn" id="fit">Fit</button>
  <button class="btn" id="info">Info</button>
  <span id="status">Nessun dato caricato</span>
  <span id="debug"></span>
</div>
<div id="out"><div class="card">Pronto. Se il JS gira, lo vedrai qui.</div></div>
<script>
const status = s => document.getElementById('status').textContent = s;
const debug = s => document.getElementById('debug').textContent = s;
const out = document.getElementById('out');
const file = document.getElementById('file');
let last = null;
function parseCSV(text){
  const lines = text.split(/?
/).map(x=>x.trim()).filter(Boolean);
  if(lines.length < 2) throw new Error('CSV vuoto');
  const sep = lines[0].includes(';') && !lines[0].includes(',') ? ';' : ',';
  const headers = lines[0].split(sep).map(x=>x.trim().toLowerCase());
  const idx = {date:headers.indexOf('date'), time:headers.indexOf('time'), open:headers.indexOf('open'), high:headers.indexOf('high'), low:headers.indexOf('low'), close:headers.indexOf('close'), volume:headers.indexOf('volume')};
  if([idx.date,idx.time,idx.open,idx.high,idx.low,idx.close].some(v=>v<0)) throw new Error('Header non valido: '+headers.join('|'));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const r = lines[i].split(sep).map(x=>x.trim());
    const t = new Date((r[idx.date]+' '+r[idx.time]).replace(/-/g,'/')).getTime();
    if(!Number.isFinite(t)) continue;
    const row = {time:new Date(t).toISOString(), open:+r[idx.open], high:+r[idx.high], low:+r[idx.low], close:+r[idx.close]};
    if(Number.isFinite(row.open) && Number.isFinite(row.high) && Number.isFinite(row.low) && Number.isFinite(row.close)) rows.push(row);
  }
  if(!rows.length) throw new Error('Nessuna riga valida');
  return rows;
}
function render(rows, name){
  last = rows;
  status('✅ '+rows.length+' righe — '+name);
  out.innerHTML = '<div class="card"><b>File:</b> '+name+'<br><b>Righe:</b> '+rows.length+'<br><b>Prima riga:</b><br><pre>'+JSON.stringify(rows[0], null, 2)+'</pre><br><b>Ultima riga:</b><br><pre>'+JSON.stringify(rows[rows.length-1], null, 2)+'</pre></div>';
}
async function load(f){
  try{
    status('Lettura in corso...');
    const buf = await f.arrayBuffer();
    debug('bytes '+buf.byteLength);
    const text = new TextDecoder('utf-8').decode(buf);
    render(parseCSV(text), f.name);
  }catch(e){
    status('Errore: '+e.message);
    debug(String(e));
    out.innerHTML = '<div class="card bad">'+String(e)+'</div>';
  }
}
file.addEventListener('change', e=>{ const f=e.target.files&&e.target.files[0]; if(f) load(f); });
document.getElementById('demo').addEventListener('click', ()=>{
  const rows=['date,time,open,high,low,close,volume'];
  rows.push('2025-01-02,00:00:00,1.0,1.2,0.9,1.1,100');
  rows.push('2025-01-02,00:01:00,1.1,1.25,1.05,1.2,120');
  render(parseCSV(rows.join('
')), 'DEMO');
});
document.getElementById('fit').addEventListener('click', ()=>{ status(last ? 'Fit premuto' : 'Nessun dato da adattare'); });
document.getElementById('info').addEventListener('click', ()=>{ alert(last ? 'Righe caricate: '+last.length : 'Nessun dato caricato'); });
out.insertAdjacentHTML('beforeend','<div class="card ok">JS attivo. Prova Carica CSV o Demo.</div>');
</script>
</body>
</html>
